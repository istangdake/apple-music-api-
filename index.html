<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8" />

  <title>Apple Music API Demo</title>

  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"></script>

  <style>

    body {
      font-family: Arial;
      padding: 40px;
      background: #f5f5f5;
    }

    h1 {
      color: #111;
    }

    input {
      width: 300px;
      padding: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      margin-left: 8px;
      cursor: pointer;
    }

    li {
      margin-top: 12px;
    }

    img {
      width: 80px;
      border-radius: 8px;
      vertical-align: middle;
      margin-right: 12px;
    }

    .song-item {
      display: flex;
      align-items: center;
      margin-top: 20px;
      background: white;
      padding: 12px;
      border-radius: 12px;
    }

  </style>

</head>

<body>

  <h1>🍎 Apple Music API Demo</h1>

  <button onclick="login()">
    登录 Apple Music
  </button>

  <br><br>

  <input
    id="keyword"
    placeholder="搜索歌曲，例如 周杰伦"
  />

  <button onclick="searchSong()">
    搜索
  </button>

  <div id="result"></div>

  <script>

    let music;
    let currentAudio = null;

    document.addEventListener(
  'musickitloaded',
  async function () {

    try {

      await MusicKit.configure({

        developerToken:
          'eyJhbGciOiJFUzI1NiIsImtpZCI6IldHWDc2NzRLMkYifQ.eyJpc3MiOiI1WVY0WDNSU0w3IiwiaWF0IjoxNzc5ODU3MDg4LCJleHAiOjE3ODUwOTg2ODh9.CxOHWID9msui-aBed2RUszM9lppUi9V9-DlK_bUASEQ7bGziakF_GYP26lNZSGxQQpe74tlsagLHZkhCBtvlcw',

        app: {
          name: 'Apple Music Demo',
          build: '1.0'
        }
      });

      music = MusicKit.getInstance();

      console.log('MusicKit 初始化成功');

    } catch (err) {

      console.error(err);

      alert(
        'MusicKit 初始化失败: ' +
        err.message
      );
    }
  }
);

    async function login() {

      if (!music) {

        alert('MusicKit 初始化失败');

        return;
      }

      try {

        await music.authorize();

        alert('Apple Music 登录成功');

      } catch (err) {

        console.error(err);

        alert('登录失败');
      }
    }

     async function searchSong() {

  const keyword =
    document.getElementById('keyword').value;

  if (!keyword) {

    alert('请输入歌曲名');

    return;
  }

  try {

    const response = await fetch(

      `https://api.music.apple.com/v1/catalog/cn/search?term=${encodeURIComponent(keyword)}&types=songs&limit=25
      `,

      {

        headers: {

          Authorization:
            `Bearer ${music.developerToken}`,

          'Music-User-Token':
            music.musicUserToken
        }
      }
    );

    const data =
      await response.json();

    console.log(data);

    const songs =
      data.results.songs.data;

    const resultDiv =
      document.getElementById('result');

    resultDiv.innerHTML = '';

    songs.forEach(song => {

  const artwork =
    song.attributes.artwork.url
      .replace('{w}', '200')
      .replace('{h}', '200');

  const previewUrl =
    song.attributes.previews?.[0]?.url || '';

  const div =
    document.createElement('div');

  div.className = 'song-item';

  div.innerHTML = `

    <img src="${artwork}" />

    <div>

      <div>

        <strong>
          ${song.attributes.name}
        </strong>

      </div>

      <div>
        ${song.attributes.artistName}
      </div>

      <br>

      <button class="play-btn">
        播放
      </button>

    </div>
  `;

  const btn =
    div.querySelector('.play-btn');

  btn.addEventListener('click', () => {

    playSong(previewUrl);

  });

  resultDiv.appendChild(div);
});

} catch (err) {

  console.error(err);

  alert('搜索失败');
}
}

function playSong(previewUrl) {

  console.log(previewUrl);

  if (!previewUrl) {

    alert('这首歌没有试听音频');

    return;
  }

  // 如果已有歌曲在播放
  if (currentAudio) {

    currentAudio.pause();

    currentAudio.currentTime = 0;
  }

  // 创建新的音频
  currentAudio =
    new Audio(previewUrl);

  currentAudio.play()
    .then(() => {

      console.log('播放成功');

    })
    .catch(err => {

      console.error(err);

      alert('播放失败');
    });
}



  </script>

</body>

</html>
